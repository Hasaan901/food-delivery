{% extends 'tracker/base.html' %}

{% block content %}
<div class="row justify-content-center my-5 animate-up">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 border-0 shadow-lg">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 70px; height: 70px; background-color: var(--fp-light-pink);">
                        <i class="bi bi-shield-lock fs-2 text-danger" style="color: var(--fp-pink) !important;"></i>
                    </div>
                    <h3 class="fw-bold text-dark mb-1">Welcome Back</h3>
                    <p class="text-muted small">Sign in to your delivery tracker profile</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="username" class="form-control border-start-0 bg-light" placeholder="Enter username" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
                            <input type="password" name="password" class="form-control border-start-0 bg-light" placeholder="Enter password" required>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary w-100 py-3 fw-bold shadow-lg" type="submit">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
                
                <div class="text-center mt-4 pt-2 border-top">
                    <p class="text-muted small mb-0">New to the platform? <a href="{% url 'register' %}" class="fw-bold text-decoration-none" style="color: var(--fp-pink);">Create Account</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
